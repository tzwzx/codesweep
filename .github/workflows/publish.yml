name: Publish

# Publishes to npm when a GitHub Release is published.
# Authentication uses npm trusted publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup: on npmjs.com, add this repo + workflow as a trusted publisher
# for the @tzwzx/codesweep package (Settings → Trusted Publisher).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      # Trusted publishing requires a recent npm; the runner's default may be too old.
      # Pinned to npm 11: npm 12.0.0 breaks `npm publish` on Node 22
      # (MODULE_NOT_FOUND: sigstore in libnpmpublish provenance).
      - run: npm install -g npm@11
      # prepublishOnly builds dist/; provenance is attached automatically via OIDC.
      - run: npm publish
